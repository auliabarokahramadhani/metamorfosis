<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Topik Belajar - Metamorfosis</title>

    <style>
        /* Menggunakan Font yang Sama */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body{
            background-image: url("latar.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Navigasi Atas - Diperbarui untuk dua tombol */
        .top-nav{
            position: absolute;
            top: 20px;
            width: 95%;
            display: flex;
            justify-content: flex-start; 
            gap: 15px; /* Memberi jarak antar tombol */
        }

        .btn-nav{
            background-color: #8bc34a;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Warna berbeda untuk tombol Home agar menonjol (Opsional) */
        .btn-home {
            background-color: #03a9f4; /* Warna biru cerah */
        }

        .btn-nav:hover{
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        /* Judul Halaman */
        .header-title{
            color: #33691e;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #c5e1a5;
            text-align: center;
        }

        .sub-title{
            color: #558b2f;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: bold;
            background: rgba(255,255,255,0.7);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* Container Pilihan */
        .content-grid{
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1000px;
        }

        /* Card Menu */
        .card-menu{
            background-color: rgba(255,255,255,0.92);
            border: 6px solid #689f38;
            border-radius: 35px;
            padding: 30px;
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card-menu:hover{
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-color: #8bc34a;
        }

        .card-menu h2{
            color: #2e7d32;
            font-size: 1.8rem;
            margin-bottom: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Area Gambar */
        .illustration-box{
            background: #f1f8e9;
            border: 3px dashed #8bc34a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .illustration-box img{
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Tombol Start */
        .btn-go {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            border: 4px solid #fff;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
            width: 100%;
        }

        .btn-go:hover {
            background: #f57c00;
            transform: scale(1.05);
        }

        /* Footer */
        .footer-text {
            margin-top: 50px;
            color: #33691e;
            font-weight: bold;
            background: rgba(255,255,255,0.5);
            padding: 5px 15px;
            border-radius: 10px;
        }

        @media(max-width: 700px){
            .header-title{ font-size: 2rem; }
            .content-grid{ gap: 20px; }
            .top-nav { justify-content: center; width: 100%; } /* Pusatkan di HP */
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <a href="cptp.html" class="btn-nav">⬅️ KEMBALI</a>
        <a href="index.html" class="btn-nav btn-home">🏠 HOME</a>
    </div>

    <h1 class="header-title">🌿 Ayo Mulai Belajar!</h1>
    <p class="sub-title">Pilih jenis metamorfosis yang ingin kamu pelajari:</p>

    <div class="content-grid">

        <div class="card-menu">
            <h2>Metamorfosis Sempurna</h2>
            <div class="illustration-box">
                <img src="kupu_kupu.jpeg" alt="Kupu-kupu">
            </div>
            <a href="m-sempurna.html" class="btn-go">MULAI BELAJAR 🚀</a>
        </div>

        <div class="card-menu">
            <h2>Metamorfosis Tidak Sempurna</h2>
            <div class="illustration-box">
                <img src="belalang.jpeg" alt="Belalang">
            </div>
            <a href="m-tidak-sempurna.html" class="btn-go">MULAI BELAJAR 🚀</a>
        </div>

    </div>

</body>
</html>
