<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Metamorfosis Seru!</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        /* Animasi Mengambang */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Quicksand', sans-serif;
        }

        body{
            /* Menggunakan gradien sebagai cadangan jika gambar latar tidak muncul */
            background: linear-gradient(135deg, #e0f7fa 0%, #f1f8e9 100%);
            background-image: url("latar1.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow-x: hidden;
        }

        /* NAV */
        .top-nav{
            position:absolute;
            top:20px;
            left:20px;
            display:flex;
            gap:15px;
            z-index: 10;
        }

        .btn-nav{
            background:#ffffff;
            color:#4caf50;
            padding:10px 20px;
            border-radius:50px; /* Lebih bulat */
            text-decoration:none;
            font-weight:bold;
            border:3px solid #8bc34a;
            box-shadow:0 6px 0px #8bc34a; /* Efek tombol 3D */
            transition:0.1s;
        }

        .btn-nav:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #8bc34a;
        }

        .btn-home{
            color:#03a9f4;
            border-color: #03a9f4;
            box-shadow: 0 6px 0px #03a9f4;
        }

        /* TITLE */
        .title-container {
            text-align: center;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        .title{
            color:#2e7d32;
            font-size:3rem;
            text-shadow: 3px 3px 0px #ffffff, 6px 6px 0px rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        /* MENU */
        .menu-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
            width:100%;
            max-width:850px;
        }

        .menu-item{
            text-decoration:none;
            color:white;
            border-radius:30px;
            padding:30px 20px;
            text-align:center;
            font-weight:bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid rgba(255,255,255,0.8);
            position: relative;
        }

        .menu-item:hover{
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .menu-item span{
            display:block;
            font-size:3.5rem; /* Emoji lebih besar */
            margin-bottom:10px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        .menu-item p{
            font-size:1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Warna Gradien Cerah */
        .blue{ background: linear-gradient(45deg, #2196f3, #00bcd4); }
        .yellow{ background: linear-gradient(45deg, #fbc02d, #ffeb3b); color: #5d4037; }
        .orange{ background: linear-gradient(45deg, #fb8c00, #ffb74d); }
        .green{ background: linear-gradient(45deg, #4caf50, #8bc34a); }
        .red{ background: linear-gradient(45deg, #f44336, #ff8a80); }
        .purple{ background: linear-gradient(45deg, #9c27b0, #e040fb); }

        /* Responsive */
        @media(max-width:750px){
            .menu-grid{ grid-template-columns:repeat(2,1fr); }
            .title{ font-size:2rem; }
            .menu-item span { font-size: 2.5rem; }
        }

        @media(max-width:450px){
            .menu-grid{ grid-template-columns: 1fr; }
            .top-nav { position: relative; margin-bottom: 20px; left: 0; }
        }

    </style>
</head>

<body>

    <div class="top-nav">
        <a href="belajar.html" class="btn-nav">⬅ Kembali</a>
        <a href="index.html" class="btn-nav btn-home">🏠 Home</a>
    </div>

    <div class="title-container">
        <h1 class="title">🦋 Metamorfosis Sempurna</h1>
        <p style="color: #558b2f; font-weight: bold;">Ayo Belajar Sambil Bermain!</p>
    </div>

    <div class="menu-grid">

        <a href="Stimulasi.html" class="menu-item blue">
            <span>📖</span>
            <p>Stimulation</p>
        </a>

        <a href="kotakDetektif.html" class="menu-item yellow">
            <span>🧩</span>
            <p>Problem Statement</p>
        </a>

        <a href="LaboratoriumVirtual.html" class="menu-item orange">
            <span>💡</span>
            <p>Data Collection</p>
        </a>

        <a href="Game.html" class="menu-item green">
            <span>🐛</span>
            <p>Data Processing </p>
        </a>

        <a href="Verification.html" class="menu-item red">
            <span>🔍</span>
            <p>Verification</p>
        </a>

        <a href="kesimpulan.html" class="menu-item purple">
            <span>🎨</span>
            <p>Generalization</p>
        </a>

    </div>

</body>
</html>
