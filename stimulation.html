<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintaks 1: Stimulasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('background.jpeg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Navigasi --- */
        .nav-header {
            width: 100%;
            padding: 20px 30px;
            display: flex;
            gap: 10px;
            justify-content: flex-start;
        }

        .btn-nav {
            padding: 8px 18px;
            background: white;
            border-radius: 50px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 2px solid transparent;
        }

        /* --- Video Overlay / Modal --- */
        #videoOverlay {
            display: none; /* Tersembunyi di awal */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        video {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- Main Content --- */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            padding-bottom: 50px;
            text-align: center;
        }

        .page-title h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: #1b5e20;
        }

        .butterfly-img {
            width: clamp(200px, 50vw, 350px);
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.4s;
        }

        /* --- Tombol --- */
        .btn-mulai, .btn-next {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #4caf50, #8bc34a);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-next {
            margin-top: 20px;
            display: none; /* Muncul setelah video habis */
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="m-sempurna.html" class="btn-nav">← Kembali</a>
        <a href="index.html" class="btn-nav">🏠 Home</a>
    </header>

    <main class="content-wrapper">
        <div class="page-title">
            <h1>STIMULATION</h1>
            <p>Halo detektif cilik, mari kita amati video di bawah ini!</p>
        </div>

        <img src="belalang3.jpeg" alt="Kupu-Kupu" class="butterfly-img">

        <button onclick="putarVideo()" class="btn-mulai">Ayo Mengamati! ➔</button>
    </main>

    <div id="videoOverlay">
        <video id="videoPetani" controls>
            <source src="videopetani.mp4" type="video/mp4">
            Browser kamu tidak mendukung pemutar video.
        </video>
        
        <a href="problemstatement.html" id="btnNext" class="btn-next">Lanjut ke Kotak Detektif ➔</a>
    </div>

    <script>
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('videoPetani');
        const btnNext = document.getElementById('btnNext');

        function putarVideo() {
            overlay.style.display = 'flex';
            video.play();
        }

        // Deteksi ketika video selesai diputar
        video.onended = function() {
            btnNext.style.display = 'inline-block';
        };
    </script>

</body>
</html>
